<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>⚖️</span>
      <h2>Quanti<span>Measure</span></h2>
    </div>

    <a routerLink="/dashboard" class="nav-item">
      <span class="nav-icon">🧮</span> Calculator
    </a>
    <a routerLink="/history" class="nav-item">
      <span class="nav-icon">🕐</span> History
    </a>
    <a routerLink="/profile" class="nav-item active">
      <span class="nav-icon">👤</span> Profile
    </a>

    <div class="sidebar-user">
      <div class="user-avatar">{{ userAvatar }}</div>
      <div class="user-info">
        <div class="user-name">{{ username }}</div>
        <div class="user-role">Member</div>
      </div>
    </div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" (click)="toggleTheme()">
    <span class="toggle-icon">{{ getThemeIcon() }}</span>
    {{ getThemeLabel() }}
    </button>

    <button class="signout-btn" (click)="signOut()">
      ↪ Sign Out
    </button>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <h1 class="page-title">My Profile</h1>
    <p class="page-subtitle">Your account information</p>

    <!-- Loading -->
    <div class="empty-state" *ngIf="loading">
      <div class="empty-icon">
        <span class="spinner"
              style="width:32px;height:32px;border-width:3px;">
        </span>
      </div>
      <p>Loading profile...</p>
    </div>

    <!-- Profile Card -->
    <div class="profile-card" *ngIf="!loading && profile">

      <div class="profile-avatar">
        {{ getAvatar() }}
      </div>

      <div class="profile-field">
        <label>Username</label>
        <p>{{ profile.username }}</p>
      </div>

      <div class="profile-field">
        <label>Email</label>
        <p>{{ profile.email }}</p>
      </div>

      <div class="profile-field">
        <label>Role</label>
        <p>
          <span class="role-badge">{{ profile.role }}</span>
        </p>
      </div>

      <div class="profile-field">
        <label>Member Since</label>
        <p>{{ joinedDate }}</p>
      </div>

    </div>

  </main>
</div>
